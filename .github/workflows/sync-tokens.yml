name: Sync design tokens

on:
  repository_dispatch:
    types: [tokens-updated]

permissions:
  contents: write
  packages: read
  pull-requests: write

jobs:
  sync:
    name: Pull token artifacts and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://npm.pkg.github.com
          scope: "@cypress-ink-labs"

      - name: Extract token artifacts from npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          # client_payload is attacker-controlled in repository_dispatch; keep in env,
          # never interpolate directly into run: shell commands.
          DISPATCH_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          VERSION=$(node -e "
            const p = JSON.parse(process.env.DISPATCH_PAYLOAD || '{}');
            const value = p.version;
            let pkgs = [];
            if (Array.isArray(value)) {
              pkgs = value;
            } else if (typeof value === 'string' && value.trim()) {
              const parsed = JSON.parse(value);
              pkgs = Array.isArray(parsed) ? parsed : [];
            }
            const ds = pkgs.find(x => x && x.name === '@cypress-ink-labs/design-system');
            console.log(ds ? ds.version : 'latest');
          ")
          # Validate version matches semver before using in shell/npm commands
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$|^latest$'; then
            echo "ERROR: unexpected version value from payload; aborting" >&2
            exit 1
          fi
          echo "Syncing @cypress-ink-labs/design-system@${VERSION}"
          echo "DESIGN_SYSTEM_VERSION=${VERSION}" >> "$GITHUB_ENV"

          mkdir -p /tmp/ds-pack
          npm pack "@cypress-ink-labs/design-system@${VERSION}" \
            --registry https://npm.pkg.github.com \
            --pack-destination /tmp/ds-pack

          TARBALL=$(find /tmp/ds-pack -maxdepth 1 -type f -name '*.tgz' -print -quit)
          if [ -z "$TARBALL" ]; then
            echo "ERROR: npm pack did not produce a tarball" >&2
            exit 1
          fi
          mkdir -p /tmp/ds-extracted
          tar -xzf "$TARBALL" -C /tmp/ds-extracted

          cp /tmp/ds-extracted/package/dist/ios/Tokens.swift \
            ios/Packages/FEDesignSystem/Sources/FEDesignSystem/Generated/Tokens.swift

          cp /tmp/ds-extracted/package/dist/android/Tokens.kt \
            android/designsystem/src/main/java/com/familyevents/designsystem/generated/Tokens.kt

      - name: Open sync PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync design tokens from @cypress-ink-labs/design-system@${{ env.DESIGN_SYSTEM_VERSION }}"
          title: "chore: sync design tokens ${{ env.DESIGN_SYSTEM_VERSION }}"
          body: "Automated token sync from `@cypress-ink-labs/design-system@${{ env.DESIGN_SYSTEM_VERSION }}`."
          branch: chore/sync-tokens-${{ env.DESIGN_SYSTEM_VERSION }}
          delete-branch: true
          labels: tokens,automated
